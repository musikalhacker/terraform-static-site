<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Terraform Static Site</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #0a0a0a; color: #0f0; }
        h1 { color: #00ff00; }
    </style>
</head>
<body>
    <h1>Hello from Azure Static Web Apps!</h1>
    <p>This site is managed with Terraform + GitHub Actions.</p>
    <p>Current time: <span id="time"></span></p>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
